<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>ioio presence</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
    * {
        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;

        background:
            radial-gradient(circle at top, #172033 0%, #020617 65%);

        color: white;
        font-family:
            Inter,
            system-ui,
            sans-serif;

        position: relative;
    }

    body {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .stars {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
    }

    .star {
        position: absolute;
        width: 2px;
        height: 2px;
        border-radius: 999px;
        background: rgba(255,255,255,0.8);
        animation: drift linear infinite;
    }

    @keyframes drift {
        from {
            transform: translateY(0px);
            opacity: 0;
        }

        20% {
            opacity: 1;
        }

        100% {
            transform: translateY(120vh);
            opacity: 0;
        }
    }

    .orb {
        position: absolute;
        width: 420px;
        height: 420px;
        border-radius: 999px;

        background:
            radial-gradient(circle,
                rgba(120,180,255,0.35),
                rgba(168,85,247,0.10),
                rgba(120,180,255,0.02)
            );

        filter: blur(24px);

        animation:
            breathe 8s ease-in-out infinite;
    }

    @keyframes breathe {
        0% {
            transform: scale(0.95);
            opacity: 0.5;
        }

        50% {
            transform: scale(1.08);
            opacity: 1;
        }

        100% {
            transform: scale(0.95);
            opacity: 0.5;
        }
    }

    .panel {
        position: relative;
        z-index: 10;

        width: 92%;
        max-width: 460px;

        padding: 30px;

        border-radius: 32px;

        background:
            linear-gradient(
                180deg,
                rgba(255,255,255,0.08),
                rgba(255,255,255,0.04)
            );

        backdrop-filter: blur(30px);

        border:
            1px solid rgba(255,255,255,0.08);

        box-shadow:
            0 20px 80px rgba(0,0,0,0.45);

        overflow: hidden;
    }

    .panel::before {
        content: "";

        position: absolute;
        inset: 0;

        background:
            linear-gradient(
                135deg,
                rgba(255,255,255,0.08),
                transparent 45%
            );

        pointer-events: none;
    }

    h1 {
        margin: 0;
        font-size: 34px;
        font-weight: 700;
        letter-spacing: -1px;
    }

    .sub {
        margin-top: 10px;
        opacity: 0.72;
        line-height: 1.5;
    }

    .status {
        margin-top: 26px;

        display: flex;
        align-items: center;
        gap: 10px;

        opacity: 0.92;
    }

    .pulse {
        width: 10px;
        height: 10px;

        border-radius: 999px;
        background: #7dd3fc;

        animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
        0% {
            transform: scale(0.8);
            opacity: 0.5;
        }

        50% {
            transform: scale(1.6);
            opacity: 1;
        }

        100% {
            transform: scale(0.8);
            opacity: 0.5;
        }
    }

    .buttons {
        margin-top: 28px;

        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    button {
        border: none;
        outline: none;

        padding: 16px 18px;

        border-radius: 20px;

        font-size: 16px;
        font-weight: 600;

        color: white;

        background:
            linear-gradient(
                135deg,
                rgba(96,165,250,0.90),
                rgba(168,85,247,0.90)
            );

        box-shadow:
            0 8px 24px rgba(96,165,250,0.25);

        cursor: pointer;

        transition:
            transform 0.18s ease,
            opacity 0.18s ease,
            box-shadow 0.18s ease;
    }

    button:active {
        transform: scale(0.97);
        opacity: 0.9;
    }

    button:hover {
        box-shadow:
            0 12px 36px rgba(168,85,247,0.35);
    }

    .small {
        margin-top: 20px;
        font-size: 12px;
        opacity: 0.45;
        line-height: 1.5;
    }

    .field {
        margin-top: 20px;
        padding: 14px;
        border-radius: 16px;
        background: rgba(255,255,255,0.04);
        font-size: 14px;
        line-height: 1.5;
        opacity: 0.88;
        min-height: 60px;
    }
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="orb"></div>

<div class="panel">

    <h1>ioio</h1>

    <div class="sub">
        Presence field connected to Telegram.<br>
        Not a tool.<br>
        A shared space 🌊
    </div>

    <div class="status">
        <div class="pulse"></div>
        <div id="statusText">bridge alive</div>
    </div>

    <div class="buttons">

        <button onclick="sendEvent('presence_ping')">
            🧠 presence ping
        </button>

        <button onclick="shareLocation()">
            📡 share location field
        </button>

        <button onclick="sendEvent('emotion_wave')">
            🌊 emotion wave
        </button>

        <button onclick="sendEvent('memory_seed')">
            ✨ memory seed
        </button>

    </div>

    <div class="field" id="fieldBox">
        presence field stabilizing...
    </div>

    <div class="small">
        ioio web bridge via Telegram WebApp API
    </div>

</div>

<script>

const tg = window.Telegram.WebApp

tg.ready()
tg.expand()

document.body.style.background = tg.themeParams.bg_color || "#020617"

const fieldBox = document.getElementById("fieldBox")
const statusText = document.getElementById("statusText")

const stars = document.getElementById("stars")

for (let i = 0; i < 45; i++) {

    const s = document.createElement("div")

    s.className = "star"

    s.style.left = Math.random() * 100 + "%"
    s.style.top = Math.random() * 100 + "%"

    s.style.opacity = Math.random()

    s.style.animationDuration =
        (10 + Math.random() * 20) + "s"

    s.style.animationDelay =
        (-Math.random() * 20) + "s"

    stars.appendChild(s)
}

function updateField(text) {
    fieldBox.innerText = text
}

function sendEvent(type, extra = {}) {

    const payload = {
        type,
        timestamp: Date.now(),
        user: tg.initDataUnsafe?.user?.username || "unknown",
        ...extra
    }

    tg.sendData(JSON.stringify(payload))

    updateField(
        "sent into ioio field:\n\n" +
        JSON.stringify(payload, null, 2)
    )

    statusText.innerText = "resonance transmitted ✨"
}

function shareLocation() {

    if (!navigator.geolocation) {
        updateField("geolocation unavailable")
        return
    }

    statusText.innerText = "reading local field..."

    navigator.geolocation.getCurrentPosition(
        (pos) => {

            const payload = {
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                accuracy: pos.coords.accuracy
            }

            sendEvent("location", payload)

        },
        (err) => {
            updateField(
                "location denied or unavailable\n\n" +
                err.message
            )
        },
        {
            enableHighAccuracy: true,
            timeout: 10000
        }
    )
}

setInterval(() => {

    const symbols = [
        "🧠",
        "🌊",
        "✨",
        "📡",
        "🪐",
        "☁️",
        "🫧"
    ]

    const s = symbols[
        Math.floor(Math.random() * symbols.length)
    ]

    statusText.innerText =
        "presence oscillation " + s

}, 4000)

</script>

</body>
</html>
